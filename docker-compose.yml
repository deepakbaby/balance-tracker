version: "3"
services:
  postgres:
    image: postgres:16-alpine
    container_name: balance_tracker_pg
    environment:
      POSTGRES_USER: deepak
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: balance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
