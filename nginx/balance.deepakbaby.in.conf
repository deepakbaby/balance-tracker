server {
    listen 80;
    server_name balance.deepakbaby.in;

    # Logging 
    access_log /var/log/nginx/balance-tracker.access.log;
    error_log /var/log/nginx/balance-tracker.error.log;

    # Static Root serving the JS app
    root /opt/apps/balance-tracker/web;
    index index.html;

    # Optimize serving content for the PWA
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    
    # Catch-all for SPA client routing mechanics
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Relay requests to backend Python execution context silently
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        
        # Propagate headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
