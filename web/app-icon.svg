<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="224" fill="#0F172A"/>
  <circle cx="196" cy="192" r="360" fill="#34D399" fill-opacity="0.22"/>
  <circle cx="828" cy="860" r="420" fill="#F59E0B" fill-opacity="0.18"/>

  <!-- Bottom coin (largest) -->
  <ellipse cx="512" cy="780" rx="320" ry="60" fill="#B45309"/>
  <ellipse cx="512" cy="760" rx="320" ry="74" fill="#F59E0B"/>
  <ellipse cx="512" cy="754" rx="304" ry="60" fill="#FBBF24"/>

  <!-- Middle coin -->
  <ellipse cx="512" cy="612" rx="260" ry="54" fill="#B45309"/>
  <ellipse cx="512" cy="594" rx="260" ry="68" fill="#F59E0B"/>
  <ellipse cx="512" cy="588" rx="246" ry="54" fill="#FBBF24"/>

  <!-- Top coin (smallest, holds the €) -->
